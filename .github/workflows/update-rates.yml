name: 金利データ自動更新

on:
  schedule:
    # 毎月 1日 と 15日 の 22:00 UTC(= 翌7:00 JST)に実行
    - cron: "0 22 1,15 * *"
  workflow_dispatch:        # 手動実行も可

permissions:
  contents: write           # data/ を自動コミットするため

concurrency:
  group: update-rates
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存ライブラリのインストール
        run: pip install -r requirements.txt

      - name: 最新金利を取得
        run: python scraper.py

      - name: 変更があればコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "変更なし。コミットしません。"
          else
            git commit -m "chore: 金利データ更新 $(date -u +%Y-%m-%d)"
            git push
          fi
